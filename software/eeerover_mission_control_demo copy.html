

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEELUNAR Rover Mission Control</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; min-height: 100vh; }
    @media (max-width: 600px) {
      .main-row { flex-direction: column !important; align-items: stretch !important; }
    }
  </style>
</head>
<body>
  <div style="background:#0d0d0d;min-height:100vh;padding:20px;font-family:'sans-serif',sans-serif,serif;color:#c8c8c8;border-radius:10px;box-sizing:border-box;display:flex;flex-direction:column;">

    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333333;padding-bottom:10px;margin-bottom:20px;">
      <span style="font-size:11px;letter-spacing:2px;color:#888888;">EEELUNARROVER // GRP-15</span>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#888888;">
        <span style="width:7px;height:7px;border-radius:50%;background:#60a5fa;display:inline-block;" id="dot"></span>
        <span>192.168.0.16</span>
      </div>
      <span style="font-size:11px;color:#888888;" id="clk">--:--:--</span>
    </div>

    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:10px;letter-spacing:4px;color:#888888;margin-bottom:10px;">ROCK CLASSIFICATION</div>
      <div id="rtype" style="font-size:52px;font-weight:bold;color:#a78bfa;letter-spacing:6px;transition:opacity 0.4s;">BASALTOID</div>
      <div style="margin-top:12px;font-size:14px;color:#888888;letter-spacing:2px;">AGE — <span id="rage" style="font-size:32px;color:#a78bfa;font-weight:bold;">1.23 Ga</span></div>
    </div>

    <div class="main-row" style="display:flex;justify-content:space-between;align-items:flex-end;flex:1;gap:20px;">

      <div style="background:#111;border:1px solid #333333;border-radius:8px;padding:18px;flex:1;min-width:200px;">
        <div style="font-size:9px;letter-spacing:4px;color:#888888;margin-bottom:16px;">SENSOR READINGS</div>

        <div style="margin-bottom:16px;border-bottom:1px solid #2e2e2e;padding-bottom:14px;">
          <div style="font-size:10px;color:#888888;margin-bottom:4px;letter-spacing:1px;">INFRARED PULSE RATE</div>
          <div style="display:flex;align-items:baseline;gap:6px;">
            <span id="irv" style="font-size:28px;color:#60a5fa;transition:color 0.4s;">547</span>
            <span style="font-size:11px;color:#888888;">s⁻¹</span>
          </div>
          <div style="margin-top:6px;height:3px;background:#2e2e2e;border-radius:2px;overflow:hidden;">
            <div id="irbar" style="height:100%;background:#60a5fa;border-radius:2px;transition:width 0.6s;width:100%;"></div>
          </div>
        </div>

        <div style="margin-bottom:16px;border-bottom:1px solid #2e2e2e;padding-bottom:14px;">
          <div style="font-size:10px;color:#888888;margin-bottom:4px;letter-spacing:1px;">ULTRASONIC 40kHz</div>
          <div id="usv" style="font-size:18px;color:#60a5fa;transition:color 0.4s;">DETECTED</div>
        </div>

        <div>
          <div style="font-size:10px;color:#888888;margin-bottom:4px;letter-spacing:1px;">MAGNETIC FIELD</div>
          <div id="magv" style="font-size:18px;color:#60a5fa;transition:color 0.4s;">↓ DOWN</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
        <div style="font-size:9px;letter-spacing:4px;color:#888888;margin-bottom:14px;">DRIVE CONTROL</div>

        <div id="wasdtip" style="font-size:9px;color:#888888;letter-spacing:1px;margin-bottom:10px;">WASD OR CLICK</div>

        <button id="btn-fwd" onmousedown="cmd('forward',this)" onmouseup="rel(this)" onmouseleave="rel(this)"
          style="width:clamp(48px,8vw,72px);height:clamp(48px,8vw,72px);background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#a78bfa;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:6px;transition:background 0.1s,border-color 0.1s;">
          <i class="ti ti-arrow-up" aria-hidden="true"></i>
        </button>

        <div style="display:flex;gap:6px;margin-bottom:6px;">
          <button id="btn-left" onmousedown="cmd('left',this)" onmouseup="rel(this)" onmouseleave="rel(this)"
            style="width:clamp(48px,8vw,72px);height:clamp(48px,8vw,72px);background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#a78bfa;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s,border-color 0.1s;">
            <i class="ti ti-arrow-left" aria-hidden="true"></i>
          </button>

          <button id="btn-stop" onmousedown="cmd('stop',this)" onmouseup="rel(this)" onmouseleave="rel(this)"
            style="width:clamp(48px,8vw,72px);height:clamp(48px,8vw,72px);background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#c03030;font-size:10px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s,border-color 0.1s;">
            STOP
          </button>

          <button id="btn-right" onmousedown="cmd('right',this)" onmouseup="rel(this)" onmouseleave="rel(this)"
            style="width:clamp(48px,8vw,72px);height:clamp(48px,8vw,72px);background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#a78bfa;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s,border-color 0.1s;">
            <i class="ti ti-arrow-right" aria-hidden="true"></i>
          </button>
        </div>

        <button id="btn-back" onmousedown="cmd('backward',this)" onmouseup="rel(this)" onmouseleave="rel(this)"
          style="width:clamp(48px,8vw,72px);height:clamp(48px,8vw,72px);background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#a78bfa;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s,border-color 0.1s;">
          <i class="ti ti-arrow-down" aria-hidden="true"></i>
        </button>

        <div id="cmdlabel" style="font-size:10px;letter-spacing:3px;color:#888888;margin-top:12px;min-height:16px;">STANDBY</div>
      </div>

    </div>

    <div style="border-top:1px solid #2e2e2e;margin-top:20px;padding-top:10px;display:flex;justify-content:space-between;font-size:9px;color:#888888;letter-spacing:1px;">
      <span>↻ SENSOR REFRESH 1s</span>
      <span id="demobadge" style="color:#3a3a8a;">◈ DEMO — CYCLING ALL ROCK TYPES</span>
      <span>UART BOARD1→BOARD2</span>
    </div>
  </div>
  <script>
  const rocks = [
    {type:'BASALTOID', age:'1.23', ir:547, us:'DETECTED', mag:'↓ DOWN'},
    {type:'GRAVION',   age:'2.87', ir:312, us:'NONE',     mag:'↓ DOWN'},
    {type:'REGOLIX',   age:'0.95', ir:312, us:'DETECTED', mag:'↑ UP'},
    {type:'LUNARITE',  age:'3.41', ir:547, us:'NONE',     mag:'↑ UP'},
  ];
  let ri = 0;

  function setRock(r) {
    const rt = document.getElementById('rtype');
    rt.style.opacity = '0';
    setTimeout(() => {
      rt.textContent = r.type;
      document.getElementById('rage').textContent = r.age + ' Ga';
      document.getElementById('irv').textContent = r.ir;
      document.getElementById('irbar').style.width = (r.ir / 547 * 100) + '%';
      const usEl = document.getElementById('usv');
      usEl.textContent = r.us;
      usEl.style.color = r.us === 'DETECTED' ? '#60a5fa' : '#c03030';
      document.getElementById('magv').textContent = r.mag;
      rt.style.opacity = '1';
    }, 400);
  }

  setInterval(() => { ri = (ri + 1) % rocks.length; setRock(rocks[ri]); }, 3500);

  setInterval(() => {
    document.getElementById('clk').textContent = new Date().toLocaleTimeString('en-GB');
  }, 1000);
  document.getElementById('clk').textContent = new Date().toLocaleTimeString('en-GB');

  const keyMap = {w:'btn-fwd', a:'btn-left', s:'btn-back', d:'btn-right', ' ':'btn-stop'};
  const cmdNames = {'btn-fwd':'FORWARD','btn-left':'LEFT','btn-back':'BACKWARD','btn-right':'RIGHT','btn-stop':'STOP'};

  function cmd(name, btn) {
    btn.style.background = '#130d2e';
    btn.style.borderColor = '#a78bfa';
    document.getElementById('cmdlabel').textContent = name.toUpperCase();
    document.getElementById('cmdlabel').style.color = '#a78bfa';
  }
  function rel(btn) {
    btn.style.background = '#161616';
    btn.style.borderColor = btn.id === 'btn-stop' ? '#2a2a2a' : '#2a2a2a';
    setTimeout(() => {
      document.getElementById('cmdlabel').textContent = 'STANDBY';
      document.getElementById('cmdlabel').style.color = '#888888';
    }, 300);
  }

  document.addEventListener('keydown', e => {
    const id = keyMap[e.key.toLowerCase()];
    if (!id) return;
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.style.background = '#130d2e';
    btn.style.borderColor = '#a78bfa';
    document.getElementById('cmdlabel').textContent = cmdNames[id];
    document.getElementById('cmdlabel').style.color = '#a78bfa';
  });
  document.addEventListener('keyup', e => {
    const id = keyMap[e.key.toLowerCase()];
    if (!id) return;
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.style.background = '#161616';
    btn.style.borderColor = '#2a2a2a';
    setTimeout(() => {
      document.getElementById('cmdlabel').textContent = 'STANDBY';
      document.getElementById('cmdlabel').style.color = '#888888';
    }, 300);
  });
  </script>
</body>
</html>
