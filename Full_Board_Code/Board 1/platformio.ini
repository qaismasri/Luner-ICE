; ═══════════════════════════════════════════════════════════════════════════════
; BOARD 1 — WiFi / Motor / Web Server Board
; Adafruit Metro M0 Express + WINC1500 WiFi Shield
; ═══════════════════════════════════════════════════════════════════════════════

[env:board1_main]
platform  = atmelsam
board     = adafruit_metro_m0
framework = arduino

lib_deps =
    khoih-prog/WiFiWebServer @ ^1.10.1

build_flags =
    -DUSE_WIFI101=true
    -DUSE_WIFI_NINA=false
    -DARDUINO_SAMD_ZERO

lib_ignore = 
    Adafruit TinyUSB Library
